  </g>

  <!-- Tier badge text -->
  <text x="80" y="108" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" font-weight="600" fill="#2B1A47" letter-spacing="1.5">LAWN-AI · SOFTWARE</text>
</svg>
