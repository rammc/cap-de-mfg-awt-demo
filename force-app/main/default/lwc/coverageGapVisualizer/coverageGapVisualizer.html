<template>
    <div class="row" role="list">
        <template for:each={tiles} for:item="t">
            <div key={t.key} class={t.cls} role="listitem">
                <lightning-icon icon-name={t.iconName} size="small" alternative-text={t.subText} class="tile__icon"></lightning-icon>
                <span class="tile__label">{t.label}</span>
                <span class="tile__sub">{t.subText}</span>
            </div>
        </template>
    </div>
</template>
