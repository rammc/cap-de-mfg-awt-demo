<template>
    <div class={scrimClass} onclick={handleScrim}>
        <aside class={drawerClass} role="dialog" aria-label="Spec-Vergleich">
            <header class="header">
                <h2 class="header__title">{headerText}</h2>
                <lightning-button-icon
                    icon-name="utility:close"
                    alternative-text="Schließen"
                    onclick={handleClose}
                    variant="bare"
                ></lightning-button-icon>
            </header>

            <div class="body">
                <template lwc:if={hasImages}>
                    <div class="hero-row">
                        <div class="hero-cell">
                            <div class="hero-image">
                                <template lwc:if={currentImage}>
                                    <img src={currentImage} alt={currentName}/>
                                </template>
                                <template lwc:else>
                                    <lightning-icon icon-name="utility:product" size="medium" alternative-text=""></lightning-icon>
                                </template>
                            </div>
                            <span class="hero-label hero-label_current">{currentName}</span>
                        </div>
                        <div class="hero-arrow">→</div>
                        <div class="hero-cell">
                            <div class="hero-image hero-image_upgrade">
                                <template lwc:if={upgradeImage}>
                                    <img src={upgradeImage} alt={upgradeName}/>
                                </template>
                                <template lwc:else>
                                    <lightning-icon icon-name="utility:product" size="medium" alternative-text=""></lightning-icon>
                                </template>
                            </div>
                            <span class="hero-label hero-label_upgrade">{upgradeName}</span>
                        </div>
                    </div>
                </template>

                <table class="diff-table">
                    <thead>
                        <tr>
                            <th class="diff-table__feature">Eigenschaft</th>
                            <th class="diff-table__current">Aktuell</th>
                            <th class="diff-table__upgrade">Upgrade</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={rows} for:item="row">
                            <tr key={row.key}>
                                <th class="diff-table__feature" scope="row">{row.label}</th>
                                <td class="diff-table__current">{row.current}</td>
                                <td class="diff-table__upgrade">
                                    <span class={row.diffCls}>
                                        <template lwc:if={row.diffPrefix}>
                                            <span class="diff__prefix">{row.diffPrefix}</span>
                                        </template>
                                        <span>{row.upgrade}</span>
                                    </span>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <footer class="footer">
                <lightning-button label="Schließen" variant="neutral" onclick={handleClose}></lightning-button>
                <lightning-button label="Zu Quote hinzufügen" variant="brand" onclick={handleAddToQuote}></lightning-button>
            </footer>
        </aside>
    </div>
</template>
